<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>學測數學解題站</title>
<script>
  MathJax = { tex: { inlineMath: [['\\(', '\\)']], displayMath: [['\\[', '\\]']] } };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js" async></script>
<style>
  :root {
    --bg: #f5f6fa; --card: #fff; --ink: #1f2433; --muted: #6b7280;
    --brand: #4f46e5; --brand-soft: #eef2ff; --line: #e5e7eb; --ok: #059669;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--ink);
    font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif; line-height: 1.7; }
  header { background: linear-gradient(135deg, #4f46e5, #6366f1); color: #fff; padding: 28px 20px 22px; }
  .wrap { max-width: 860px; margin: 0 auto; }
  header h1 { margin: 0 0 4px; font-size: 24px; }
  header p { margin: 0; opacity: .9; font-size: 14px; }
  .titlebar { display: flex; align-items: center; gap: 12px; }
  .logout { margin-left: auto; color: #fff; font-size: 16px; font-weight: 700; cursor: pointer; white-space: nowrap;
    background: rgba(255,255,255,.18); border: 1.5px solid rgba(255,255,255,.6); border-radius: 10px; padding: 9px 18px; }
  .logout:hover { background: rgba(255,255,255,.3); }
  .topbar { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
  .search { flex: 1; min-width: 200px; padding: 11px 14px; border: none; border-radius: 10px; font-size: 15px; outline: none; }
  .btn-ask { background: #fff; color: var(--brand); text-decoration: none; font-weight: 700; padding: 11px 18px; border-radius: 10px; white-space: nowrap; }
  .chips { display: flex; gap: 8px; flex-wrap: wrap; padding: 16px 20px 0; max-width: 860px; margin: 0 auto; }
  .chip { border: 1px solid var(--line); background: #fff; color: var(--muted); padding: 6px 13px; border-radius: 999px; font-size: 13px; cursor: pointer; }
  .chip.active { background: var(--brand); color: #fff; border-color: var(--brand); }
  main { max-width: 860px; margin: 0 auto; padding: 18px 20px 60px; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 18px 20px; margin-bottom: 16px; }
  .meta { display: flex; gap: 10px; align-items: center; font-size: 13px; color: var(--muted); margin-bottom: 8px; flex-wrap: wrap; }
  .tag { background: var(--brand-soft); color: var(--brand); padding: 2px 9px; border-radius: 6px; font-weight: 600; }
  .q { font-size: 16px; font-weight: 600; margin: 2px 0 6px; white-space: pre-wrap; }
  .qimg { max-width: 100%; border-radius: 10px; margin: 8px 0; border: 1px solid var(--line); }
  .reveal { margin-top: 10px; background: var(--brand-soft); color: var(--brand); border: none; padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
  .answer { display: none; margin-top: 12px; padding-top: 14px; border-top: 1px dashed var(--line); }
  .answer.open { display: block; }
  .answer .lbl { color: var(--ok); font-weight: 700; font-size: 13px; }
  .answer h4 { margin: 16px 0 4px; font-size: 15px; color: var(--brand); font-weight: 700; }
  .answer p { margin: 7px 0; }
  .answer ul, .answer ol { margin: 7px 0; padding-left: 22px; }
  .answer .key { background: #fff7ed; border-left: 4px solid #f59e0b; border-radius: 8px; padding: 10px 14px; margin: 10px 0; }
  .answer .eg { background: #f8fafc; border: 1px solid var(--line); border-radius: 8px; padding: 10px 14px; margin: 10px 0; }
  .answer .ans { background: #ecfdf5; border: 1px solid #34d399; border-radius: 8px; padding: 12px 16px; margin: 16px 0; font-weight: 600; }
  .answer .dia { font-family: "Consolas","Courier New",monospace; white-space: pre; overflow-x: auto; background: #f6f8fa; color: #1f2433; border: 1px solid var(--line); border-radius: 8px; padding: 14px 16px; margin: 10px 0; line-height: 1.5; font-size: 13.5px; }
  .answer .r { color: #dc2626; font-weight: 700; }
  .answer .g { color: #059669; font-weight: 700; }
  .answer .b { color: #2563eb; font-weight: 700; }
  .answer table { border-collapse: collapse; margin: 10px 0; width: 100%; }
  .answer th, .answer td { border: 1px solid var(--line); padding: 6px 10px; text-align: center; font-size: 14px; }
  .answer th { background: var(--brand-soft); color: var(--brand); }
  .state { text-align: center; color: var(--muted); padding: 44px 0; }
  .status { padding: 2px 9px; border-radius: 6px; font-weight: 600; font-size: 12px; }
  .status.pending { background: #fff7ed; color: #c2410c; }
  .status.solved { background: #eff6ff; color: #1d4ed8; }
  .status.published { background: #ecfdf5; color: #059669; }
  .pending-note { margin-top: 10px; background: #f8fafc; border: 1px dashed var(--line); border-radius: 8px; padding: 10px 14px; color: var(--muted); font-size: 14px; }
  .ansbar { display: flex; align-items: center; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
  .ansbar .reveal { margin-top: 0; }
  .actions { margin-left: auto; display: inline-flex; align-items: center; gap: 8px; }
  .votes { display: inline-flex; gap: 8px; }
  .vote { display: inline-flex; align-items: center; gap: 5px; border: 1px solid var(--line); background: #fff; color: var(--muted); border-radius: 999px; padding: 6px 12px; font-size: 14px; cursor: pointer; }
  .vote:hover { border-color: #c7cdd6; }
  .vote.up.active { background: #ecfdf5; border-color: #34d399; color: #059669; }
  .vote.down.active { background: #fef2f2; border-color: #f87171; color: #dc2626; }
  .vote .vc { font-weight: 700; font-variant-numeric: tabular-nums; }
  .bookmark { display: inline-flex; align-items: center; justify-content: center; border: 1px solid var(--line); background: #fff; border-radius: 999px; padding: 6px 11px; cursor: pointer; }
  .bookmark svg { display: block; width: 16px; height: 16px; fill: none; stroke: #9ca3af; stroke-width: 2; stroke-linejoin: round; }
  .bookmark:hover { border-color: #c7cdd6; }
  .bookmark.active { background: #fffbeb; border-color: #fcd34d; }
  .bookmark.active svg { fill: #f59e0b; stroke: #f59e0b; }
  .comments { margin-top: 14px; border-top: 1px solid var(--line); padding-top: 12px; }
  .cbtn { background: none; border: none; color: var(--brand); font-weight: 600; font-size: 14px; cursor: pointer; padding: 0; }
  .cbox { margin-top: 12px; }
  .clist { display: flex; flex-direction: column; gap: 10px; margin-bottom: 12px; }
  .citem { background: #f8fafc; border: 1px solid var(--line); border-radius: 10px; padding: 10px 12px; }
  .cmeta { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted); margin-bottom: 4px; }
  .cauthor { font-weight: 700; color: var(--ink); }
  .cdel { margin-left: auto; background: none; border: none; color: #dc2626; font-size: 12px; cursor: pointer; padding: 0; }
  .cbody { font-size: 14px; white-space: pre-wrap; word-break: break-word; }
  .cempty { color: var(--muted); font-size: 13px; margin: 4px 0; }
  .cform { display: flex; gap: 8px; }
  .cinput { flex: 1; border: 1px solid var(--line); border-radius: 10px; padding: 9px 12px; font-size: 14px; outline: none; font-family: inherit; }
  .csend { background: var(--brand); color: #fff; border: none; border-radius: 10px; padding: 9px 16px; font-weight: 600; font-size: 14px; cursor: pointer; white-space: nowrap; }
  .csend:disabled { opacity: .6; }
  /* 登入關卡（.lg / .lg-*）樣式改由 config.js 統一注入，與 upload 頁共用 */
</style>
</head>
<body>
<header>
  <div class="wrap">
    <div class="titlebar">
      <h1>📚 學測數學解題站</h1>
      <span class="logout" id="logout" style="display:none">登出</span>
    </div>
    <p>同學上傳題目，老師審過的解答都在這裡 — 大家都看得到</p>
    <div class="topbar">
      <input class="search" id="search" placeholder="🔍 搜尋題目、章節、關鍵字…">
      <a class="btn-ask" href="upload.html">✏️ 我要問問題</a>
    </div>
  </div>
</header>

<!-- 登入關卡：未登入時顯示、擋住題庫（內容由 config.js 的 mountLoginGate 注入）-->
<div id="gate" style="display:none"></div>

<div class="chips" id="chips">
  <span class="chip active" data-cat="mine">我的</span>
  <span class="chip" data-cat="fav">收藏</span>
  <span class="chip" data-cat="all">全部</span>
  <span class="chip" data-cat="高一">高一</span>
  <span class="chip" data-cat="數A">數A</span>
  <span class="chip" data-cat="數B">數B</span>
</div>

<main id="list">
  <p class="state" id="state">載入中…</p>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
  var listEl = document.getElementById('list');
  var curCat = 'mine', curQ = '';
  var rows = [];        // 公開題庫（已發布）
  var myRows = [];      // 我的（自己上傳，含各狀態）
  var favRows = [];     // 收藏（自己收藏的已發布題目）
  var loadedPublic = false, loadedMine = false;
  var STATUS_LABEL = { pending: '待解中', solved: '老師審核中', published: '已發布' };
  var myUid = null;         // 目前登入者 id（投票／收藏用）
  var voteCounts = {};      // question_id -> { ups, downs }
  var myVotes = {};         // question_id -> 1(讚) | -1(倒讚)
  var loadedVotes = false;
  var myBookmarks = {};     // question_id -> true（自己收藏的）
  var loadedBookmarks = false;
  var bmBusy = {};          // 防同題連點
  var isAdmin = false;      // 是否為管理者 jimmy（可刪任何人留言）
  var myEmail = '';         // 目前登入者信箱（診斷用）
  var ADMIN_EMAIL = 'jimmy0823@tkgsh.tn.edu.tw';
  var commentCount = {};    // question_id -> 留言數（統計，一次載入）
  var commentsByQ = {};     // question_id -> 留言陣列（展開時才抓）
  var loadedCommentCounts = false;

  function esc(s) { return (s || '').replace(/[&<>]/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]; }); }
  // 屬性值跳脫（含雙引號）：image_url 是不信任輸入，放進 src="" 前必須跳脫，避免屬性逃逸型 XSS
  function escAttr(s) { return (s || '').replace(/[&<>"']/g, function (c) { return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]; }); }
  // 只接受 http(s) 圖片網址，並對 src 做屬性跳脫（雙重防線）
  function imgHtml(url) { return /^https?:\/\//i.test(url || '') ? '<img class="qimg" src="' + escAttr(url) + '" alt="題目照片">' : ''; }
  // 點讚 / 倒讚按鈕（顯示票數；active = 自己目前的選擇）
  function voteButtons(r) {
    var mv = myVotes[r.id], c = voteCounts[r.id] || { ups: 0, downs: 0 };
    return '<span class="votes">' +
      '<button type="button" class="vote up' + (mv === 1 ? ' active' : '') + '" data-q="' + escAttr(r.id) + '" data-v="1">👍 <span class="vc">' + (c.ups || 0) + '</span></button>' +
      '<button type="button" class="vote down' + (mv === -1 ? ' active' : '') + '" data-q="' + escAttr(r.id) + '" data-v="-1">👎 <span class="vc">' + (c.downs || 0) + '</span></button>' +
      '</span>';
  }
  // 收藏（書籤）按鈕；active = 自己已收藏。用 SVG 書籤（垂直、尾巴朝正下方，不像 emoji 會歪）
  var BOOKMARK_SVG = '<svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 3h12a1 1 0 0 1 1 1v17l-7-4-7 4V4a1 1 0 0 1 1-1z"/></svg>';
  function bookmarkButton(r) {
    var on = !!myBookmarks[r.id];
    return '<button type="button" class="bookmark' + (on ? ' active' : '') + '" data-q="' + escAttr(r.id) + '" aria-label="收藏" title="' + (on ? '取消收藏' : '收藏') + '">' + BOOKMARK_SVG + '</button>';
  }
  // 解答區塊（answer 是老師/藍毒的信任內容，原樣當 HTML 渲染）；看解答旁附點讚/倒讚/收藏
  function answerBlock(r) {
    return '<div class="ansbar"><button class="reveal">看解答 ▾</button>' +
             '<span class="actions">' + voteButtons(r) + bookmarkButton(r) + '</span>' +
           '</div>' +
           '<div class="answer"><span class="lbl">✓ 老師已審核</span><div>' + (r.answer || '') + '</div></div>';
  }

  // 留言區（每題題目下；懶載入：展開才抓該題留言）
  function commentSection(r) {
    var n = commentCount[r.id] || 0;
    return '<div class="comments" data-q="' + escAttr(r.id) + '">' +
      '<button type="button" class="cbtn">💬 留言 <span class="cc">' + n + '</span></button>' +
      '<div class="cbox" style="display:none">' +
        '<div class="clist"></div>' +
        '<div class="cform"><input class="cinput" type="text" maxlength="500" placeholder="寫下留言…"><button type="button" class="csend">送出</button></div>' +
      '</div>' +
    '</div>';
  }
  // 單則留言（body/author_name 為不信任輸入，一律跳脫；刪除鈕只在本人或管理者顯示）
  function commentItemHtml(c) {
    var canDel = c.mine || isAdmin;
    var date = (c.created_at || '').slice(0, 10);
    return '<div class="citem">' +
      '<div class="cmeta"><span class="cauthor">' + esc(c.author_name || '匿名') + '</span><span class="ctime">' + date + '</span>' +
        (canDel ? '<button type="button" class="cdel" data-id="' + escAttr(c.id) + '">刪除</button>' : '') +
      '</div>' +
      '<div class="cbody">' + esc(c.body) + '</div>' +
    '</div>';
  }
  function renderCommentList(qid) {
    var box = document.querySelector('.comments[data-q="' + qid + '"] .clist');
    if (!box) return;
    var list = commentsByQ[qid] || [];
    box.innerHTML = list.length ? list.map(commentItemHtml).join('') : '<p class="cempty">還沒有人留言，來當第一個 😊</p>';
  }
  function updateCommentCount(qid) {
    var el = document.querySelector('.comments[data-q="' + qid + '"] .cc');
    if (el) el.textContent = commentsByQ[qid] ? commentsByQ[qid].length : (commentCount[qid] || 0);
  }

  // 公開題庫卡片（已發布）
  function cardHtml(r) {
    var date = r.published_at ? r.published_at.slice(0, 10) : '';
    var qt = r.question_text ? '<div class="q">' + esc(r.question_text) + '</div>' : '';
    var body = r.answer ? answerBlock(r) : '<div class="pending-note">這題已發布，解答稍後補上 😊</div>';
    return '<article class="card">' +
      '<div class="meta"><span class="tag">' + esc(r.grade) + '・' + esc(r.chapter) + '</span><span>' + date + '</span></div>' +
      qt + imgHtml(r.image_url) + body + commentSection(r) +
      '</article>';
  }

  // 「我的」卡片（含狀態徽章；未發布不給看解答，answer 已由後端 view 遮成 null）
  function myCardHtml(r) {
    var date = (r.created_at || '').slice(0, 10);
    var qt = r.question_text ? '<div class="q">' + esc(r.question_text) + '</div>' : '';
    var badge = '<span class="status ' + escAttr(r.status) + '">' + (STATUS_LABEL[r.status] || esc(r.status)) + '</span>';
    var body;
    if (r.status === 'published') {
      body = r.answer ? answerBlock(r) : '<div class="pending-note">這題已發布，解答稍後補上 😊</div>';
    } else if (r.status === 'pending') {
      body = '<div class="pending-note">老師還沒開始解這題，發布後就看得到解答 😊</div>';
    } else {
      body = '<div class="pending-note">老師正在審核解答，發布後就看得到 😊</div>';
    }
    var comments = (r.status === 'published') ? commentSection(r) : '';   // 只有已發布題目有留言區
    return '<article class="card">' +
      '<div class="meta"><span class="tag">' + esc(r.grade) + '・' + esc(r.chapter) + '</span>' + badge + '<span>' + date + '</span></div>' +
      qt + imgHtml(r.image_url) + body + comments +
      '</article>';
  }

  function render() {
    var isMine = curCat === 'mine', isFav = curCat === 'fav';
    var data = isMine ? myRows : isFav ? favRows : rows;
    var html = data.filter(function (r) {
      if (!isMine && !isFav && curCat !== 'all' && r.grade !== curCat) return false;
      var hay = ((r.grade || '') + ' ' + (r.chapter || '') + ' ' + (r.question_text || '') + ' ' + (r.answer || '')).toLowerCase();
      return curQ === '' || hay.indexOf(curQ) > -1;
    }).map(isMine ? myCardHtml : cardHtml).join('');
    if (!html) {
      var empty;
      if (isMine) empty = myRows.length ? '找不到符合的題目 🥲' : '你還沒上傳過題目，點右上角「我要問問題」開始吧 😊';
      else if (isFav) empty = favRows.length ? '找不到符合的題目 🥲' : '你還沒收藏任何題目，點題目上的 🔖 收藏起來 😊';
      else if (!rows.length) empty = '目前還沒有已發布的題目，敬請期待 😊';
      else empty = curQ ? '找不到符合的題目 🥲' : '這個分類目前還沒有題目 😊';
      listEl.innerHTML = '<p class="state">' + empty + '</p>';
      return;
    }
    listEl.innerHTML = html;
    if (window.MathJax && MathJax.typesetPromise) MathJax.typesetPromise([listEl]);
  }

  // 依分類延遲載入：mine → my_questions；fav → my_bookmarks（每次重抓，收藏會變動）；其餘 → public_questions
  async function ensureData(cat) {
    if (cat === 'mine') {
      if (loadedMine) return true;
      listEl.innerHTML = '<p class="state">載入中…</p>';
      var res = await sb.from('my_questions').select('*').order('created_at', { ascending: false });
      if (res.error) { listEl.innerHTML = '<p class="state">載入失敗：' + res.error.message + '</p>'; return false; }
      myRows = res.data || []; loadedMine = true; return true;
    }
    if (cat === 'fav') {
      listEl.innerHTML = '<p class="state">載入中…</p>';
      var resf = await sb.from('my_bookmarks').select('*');   // view 已依收藏時間新到舊排序
      if (resf.error) { listEl.innerHTML = '<p class="state">載入失敗：' + resf.error.message + '</p>'; return false; }
      favRows = resf.data || []; return true;
    }
    if (loadedPublic) return true;
    listEl.innerHTML = '<p class="state">載入中…</p>';
    var res2 = await sb.from('public_questions').select('*').order('published_at', { ascending: false });
    if (res2.error) { listEl.innerHTML = '<p class="state">載入失敗：' + res2.error.message + '</p>'; return false; }
    rows = res2.data || []; loadedPublic = true; return true;
  }

  // 載入票數統計與「自己的投票」（只抓一次）
  async function ensureVotes() {
    if (loadedVotes) return;
    var c = await sb.from('answer_vote_counts').select('*');
    if (!c.error) (c.data || []).forEach(function (r) { voteCounts[r.question_id] = { ups: +r.ups || 0, downs: +r.downs || 0 }; });
    var m = await sb.from('answer_votes').select('question_id,vote');
    if (!m.error) (m.data || []).forEach(function (r) { myVotes[r.question_id] = +r.vote; });
    loadedVotes = true;
  }

  // 載入「自己的收藏」清單（只抓一次，用來標示書籤 active）
  async function ensureBookmarks() {
    if (loadedBookmarks) return;
    var b = await sb.from('bookmarks').select('question_id');
    if (!b.error) (b.data || []).forEach(function (r) { myBookmarks[r.question_id] = true; });
    loadedBookmarks = true;
  }

  // 載入各題留言數（只抓一次；留言內容展開才抓）
  async function ensureCommentCounts() {
    if (loadedCommentCounts) return;
    var r = await sb.from('comment_counts').select('*');
    if (!r.error) (r.data || []).forEach(function (x) { commentCount[x.question_id] = +x.n || 0; });
    loadedCommentCounts = true;
  }

  async function selectCat(cat) {
    curCat = cat;
    if (!(await ensureData(cat))) return;
    await ensureVotes();
    await ensureBookmarks();
    await ensureCommentCounts();
    render();
  }

  // 抓某題的留言並渲染（展開留言區、送出、刪除後都會呼叫）
  async function loadComments(qid, listBox) {
    if (listBox) listBox.innerHTML = '<p class="cempty">載入中…</p>';
    var r = await sb.from('question_comments').select('*').eq('question_id', qid).order('created_at', { ascending: true });
    if (r.error) { if (listBox) listBox.innerHTML = '<p class="cempty">留言載入失敗：' + esc(r.error.message) + '</p>'; return; }
    commentsByQ[qid] = r.data || [];
    commentCount[qid] = commentsByQ[qid].length;   // 同步計數，讓之後重繪的數字正確
    renderCommentList(qid);
    updateCommentCount(qid);
  }

  // 送出留言
  async function onPostComment(sendBtn) {
    if (!myUid) return;
    var wrap = sendBtn.closest('.comments'), qid = wrap.dataset.q;
    var input = wrap.querySelector('.cinput'), body = input.value.trim();
    if (!body) return;
    sendBtn.disabled = true;
    try {
      var res = await sb.from('comments').insert({ question_id: qid, body: body });
      if (res.error) throw res.error;
      input.value = '';
      await loadComments(qid, wrap.querySelector('.clist'));   // 重抓以取得新留言與其 id
    } catch (err) {
      alert('留言沒送出，請稍後再試：' + (err && err.message ? err.message : err));
    } finally {
      sendBtn.disabled = false;
    }
  }

  // 刪除留言（本人或管理者；後端 RLS 亦強制）。用 count 偵測「刪了 0 筆」的被擋情況
  async function onDeleteComment(delBtn) {
    if (!confirm('確定刪除這則留言？')) return;
    var wrap = delBtn.closest('.comments'), qid = wrap.dataset.q, id = delBtn.dataset.id;
    try {
      var res = await sb.from('comments').delete({ count: 'exact' }).eq('id', id);
      if (res.error) throw res.error;
      if (!res.count) {   // RLS 擋下、實際 0 筆被刪
        alert('沒能刪除這則留言（後端刪了 0 筆，被權限擋下）。\n\n目前登入：' + (myEmail || '未知') +
              '\n管理者權限：' + (isAdmin ? '是' : '否') +
              '\n\n刪別人的留言需用管理者帳號 ' + ADMIN_EMAIL + ' 登入；\n若這是你自己的留言仍失敗，代表後端刪除規則(SQL)沒設好。');
        return;
      }
      await loadComments(qid, wrap.querySelector('.clist'));
    } catch (err) {
      alert('刪除失敗，請稍後再試：' + (err && err.message ? err.message : err));
    }
  }

  // 只更新某題兩顆投票鈕的 active 狀態與數字（不整頁重繪，避免收合已展開的解答）
  function updateVoteUI(q) {
    var c = voteCounts[q] || { ups: 0, downs: 0 }, mv = myVotes[q];
    var btns = document.querySelectorAll('.vote[data-q="' + q + '"]');
    for (var i = 0; i < btns.length; i++) {
      var b = btns[i], isUp = b.dataset.v === '1';
      b.classList.toggle('active', isUp ? mv === 1 : mv === -1);
      var vc = b.querySelector('.vc');
      if (vc) vc.textContent = isUp ? (c.ups || 0) : (c.downs || 0);
    }
  }

  // 點讚 / 倒讚：同一個再點＝取消；點另一個＝切成後者、取消前者
  var voting = {};   // 防同題連點競態
  async function onVote(btn) {
    if (!myUid) return;
    var q = btn.dataset.q, dir = parseInt(btn.dataset.v, 10);
    if (voting[q]) return; voting[q] = true;
    var prev = myVotes[q];                       // undefined | 1 | -1
    var c = voteCounts[q] || (voteCounts[q] = { ups: 0, downs: 0 });
    var snapUps = c.ups || 0, snapDowns = c.downs || 0;
    var next = (prev === dir) ? 0 : dir;         // 再點同一個→取消；否則切成這個
    // 樂觀更新本地狀態
    if (prev === 1) c.ups = Math.max(0, (c.ups || 0) - 1);
    if (prev === -1) c.downs = Math.max(0, (c.downs || 0) - 1);
    if (next === 1) c.ups = (c.ups || 0) + 1;
    if (next === -1) c.downs = (c.downs || 0) + 1;
    if (next === 0) delete myVotes[q]; else myVotes[q] = next;
    updateVoteUI(q);
    // 寫入後端（回傳 error 與網路層 reject 都要還原；finally 確保解鎖，避免鎖死）
    try {
      var res = (next === 0)
        ? await sb.from('answer_votes').delete().eq('question_id', q).eq('user_id', myUid)
        : await sb.from('answer_votes').upsert({ question_id: q, user_id: myUid, vote: next }, { onConflict: 'question_id,user_id' });
      if (res && res.error) throw res.error;
    } catch (err) {                              // 失敗→還原本地狀態
      c.ups = snapUps; c.downs = snapDowns;
      if (prev === undefined) delete myVotes[q]; else myVotes[q] = prev;
      updateVoteUI(q);
      alert('投票沒成功，請稍後再試：' + (err && err.message ? err.message : err));
    } finally {
      voting[q] = false;
    }
  }

  // 更新某題所有書籤鈕的 active 狀態
  function updateBookmarkUI(q) {
    var on = !!myBookmarks[q];
    var btns = document.querySelectorAll('.bookmark[data-q="' + q + '"]');
    for (var i = 0; i < btns.length; i++) {
      btns[i].classList.toggle('active', on);
      btns[i].title = on ? '取消收藏' : '收藏';
    }
  }

  // 收藏 / 取消收藏（再點一次即取消）
  async function onBookmark(btn) {
    if (!myUid) return;
    var q = btn.dataset.q;
    if (bmBusy[q]) return; bmBusy[q] = true;
    var was = !!myBookmarks[q], now = !was;
    if (now) myBookmarks[q] = true; else delete myBookmarks[q];
    updateBookmarkUI(q);
    try {
      var res = now
        ? await sb.from('bookmarks').upsert({ question_id: q, user_id: myUid }, { onConflict: 'question_id,user_id', ignoreDuplicates: true })
        : await sb.from('bookmarks').delete().eq('question_id', q).eq('user_id', myUid);
      if (res && res.error) throw res.error;
      // 在「收藏」分頁取消收藏 → 從清單移除該題並重繪（render 會依搜尋/數量顯示正確的清單或空狀態）
      if (!now && curCat === 'fav') {
        favRows = favRows.filter(function (r) { return r.id !== q; });
        render();
      }
    } catch (err) {                              // 失敗→還原
      if (was) myBookmarks[q] = true; else delete myBookmarks[q];
      updateBookmarkUI(q);
      alert('收藏沒成功，請稍後再試：' + (err && err.message ? err.message : err));
    } finally {
      bmBusy[q] = false;
    }
  }

  document.getElementById('search').addEventListener('input', function () { curQ = this.value.trim().toLowerCase(); render(); });
  document.getElementById('chips').addEventListener('click', function (e) {
    if (!e.target.classList.contains('chip')) return;
    document.querySelector('.chip.active').classList.remove('active');
    e.target.classList.add('active');
    selectCat(e.target.dataset.cat);
  });
  document.addEventListener('click', function (e) {
    if (!e.target.closest) return;
    var vbtn = e.target.closest('.vote');
    if (vbtn) { onVote(vbtn); return; }
    var bbtn = e.target.closest('.bookmark');
    if (bbtn) { onBookmark(bbtn); return; }
    var cdel = e.target.closest('.cdel');
    if (cdel) { onDeleteComment(cdel); return; }
    var csend = e.target.closest('.csend');
    if (csend) { onPostComment(csend); return; }
    var cbtn = e.target.closest('.cbtn');
    if (cbtn) {   // 展開/收合留言區；第一次展開才抓留言
      var wrap = cbtn.closest('.comments'), box = wrap.querySelector('.cbox');
      var open = box.style.display === 'none';
      box.style.display = open ? 'block' : 'none';
      if (open) {   // 已快取→直接用快取重繪（重繪後 DOM 是空的）；未快取→抓
        if (commentsByQ[wrap.dataset.q]) renderCommentList(wrap.dataset.q);
        else loadComments(wrap.dataset.q, wrap.querySelector('.clist'));
      }
      return;
    }
    if (!e.target.classList.contains('reveal')) return;
    var card = e.target.closest('.card'); if (!card) return;
    var ans = card.querySelector('.answer'); if (!ans) return;
    ans.classList.toggle('open');
    e.target.textContent = ans.classList.contains('open') ? '收合解答 ▴' : '看解答 ▾';
  });
  // 留言輸入框按 Enter 送出
  document.addEventListener('keydown', function (e) {
    if (e.key !== 'Enter') return;
    if (!(e.target.classList && e.target.classList.contains('cinput'))) return;
    e.preventDefault();
    var form = e.target.closest('.cform'); if (form) onPostComment(form.querySelector('.csend'));
  });

  // ===== 登入關卡：沒登入就不給看題庫（登入元件在 config.js）=====
  // 切換題庫外觀（搜尋列／分類／清單）的顯示
  function setBankVisible(v) {
    var tb = document.querySelector('.topbar'); if (tb) tb.style.display = v ? '' : 'none';
    document.getElementById('chips').style.display = v ? '' : 'none';
    listEl.style.display = v ? '' : 'none';
    document.getElementById('logout').style.display = v ? '' : 'none';   // 登出只在登入後（看得到題庫時）顯示
  }
  document.getElementById('logout').addEventListener('click', async function () { await sb.auth.signOut(); location.reload(); });
  function showGate(wrongEmail) {
    setBankVisible(false);
    var g = document.getElementById('gate');
    g.style.display = 'block';
    var gate = mountLoginGate(g, '請先用學校帳號登入才能瀏覽題庫');
    if (wrongEmail) gate.showError('這個帳號（' + wrongEmail + '）不是學校帳號，請改用 @' + SCHOOL_DOMAIN + ' 登入');
  }

  // 預設先藏題庫外觀，確認登入後才顯示（避免未登入者看到閃一下）
  setBankVisible(false);

  async function init() {
    var session = (await sb.auth.getSession()).data.session;
    if (!session) { showGate(null); return; }
    var email = (session.user.email || '').toLowerCase();
    if (!email.endsWith('@' + SCHOOL_DOMAIN)) { await sb.auth.signOut(); showGate(email); return; }
    myUid = session.user.id;          // 記住登入者 id（投票／收藏／留言用）
    myEmail = email;
    isAdmin = (email === ADMIN_EMAIL); // 管理者可刪任何人留言
    setBankVisible(true);   // 已用學校帳號登入 → 顯示題庫
    selectCat('mine');      // 預設只載「我的」，避免一進來就抓全部題庫
  }
  init();
</script>
</body>
</html>
