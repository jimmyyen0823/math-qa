<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>上傳題目 — 學測數學解題站</title>
<style>
  :root { --bg:#f5f6fa; --card:#fff; --ink:#1f2433; --muted:#6b7280; --brand:#4f46e5; --brand-soft:#eef2ff; --line:#e5e7eb; --ok:#059669; }
  * { box-sizing: border-box; }
  body { margin:0; background:var(--bg); color:var(--ink); font-family:"Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif; line-height:1.7; }
  header { background: linear-gradient(135deg,#4f46e5,#6366f1); color:#fff; padding:24px 20px; }
  header .wrap { max-width:620px; margin:0 auto; }
  header h1 { margin:0; font-size:22px; }
  header a { color:#fff; opacity:.9; font-size:14px; text-decoration:none; }
  main { max-width:620px; margin:0 auto; padding:24px 20px 60px; }
  .panel { background:var(--card); border:1px solid var(--line); border-radius:14px; padding:26px 22px; }
  .gate { text-align:center; }
  .gate .lock { font-size:40px; }
  .gate h2 { margin:8px 0 4px; }
  .gate p { color:var(--muted); margin:0 0 20px; font-size:14px; }
  .gbtn { display:inline-flex; align-items:center; gap:10px; background:#fff; cursor:pointer; border:1px solid #dadce0; border-radius:10px; padding:12px 20px; font-size:15px; font-weight:600; color:#3c4043; }
  .gicon { width:18px; height:18px; }
  .note { font-size:12px; color:var(--muted); margin-top:16px; }
  .who { display:flex; align-items:center; gap:10px; font-size:14px; color:var(--muted); margin-bottom:18px; flex-wrap:wrap; }
  .who .avatar { width:30px; height:30px; border-radius:50%; background:var(--brand); color:#fff; display:grid; place-items:center; font-weight:700; }
  .who .out { margin-left:auto; color:var(--brand); cursor:pointer; font-size:13px; }
  label { font-weight:600; font-size:14px; display:block; margin:16px 0 6px; }
  .drop { border:2px dashed #c7d2fe; background:var(--brand-soft); border-radius:12px; padding:26px; text-align:center; color:var(--brand); cursor:pointer; font-size:14px; }
  .drop small { color:var(--muted); display:block; margin-top:4px; }
  textarea, select, input[type="text"] { width:100%; border:1px solid var(--line); border-radius:10px; padding:11px 13px; font-size:15px; font-family:inherit; outline:none; }
  textarea { min-height:90px; resize:vertical; }
  .req { color:#dc2626; font-size:12px; font-weight:600; }
  .submit { width:100%; margin-top:22px; background:var(--brand); color:#fff; border:none; border-radius:10px; padding:14px; font-size:16px; font-weight:700; cursor:pointer; }
  .submit:disabled { opacity:.6; cursor:default; }
  .preview { margin-top:10px; font-size:13px; color:var(--ok); }
  .err { color:#dc2626; font-size:14px; margin-top:12px; }
  .big { font-size:44px; }
  #done h2 { margin:8px 0; color:var(--ok); }
  #done p { color:var(--muted); }
  #done a { color:var(--brand); }
</style>
</head>
<body>
<header><div class="wrap">
  <h1>✏️ 上傳數學題目</h1>
  <a href="index.html">← 回題庫</a>
</div></header>

<main>
  <p class="panel gate" id="loading">載入中…</p>

  <!-- 未開放時段 -->
  <div class="panel gate" id="closed" style="display:none">
    <div class="lock">⏰</div>
    <h2>目前未開放上傳</h2>
    <p>每天 <b>中午 12:00 ～ 晚上 21:00</b>（台灣時間）才能上傳題目<br>現在是 <span id="nowtime"></span>，請於開放時間再來 😊</p>
    <a class="gbtn" href="index.html" style="text-decoration:none">先去逛逛題庫 →</a>
  </div>

  <!-- 登入 -->
  <div class="panel gate" id="login" style="display:none">
    <div class="lock">🔒</div>
    <h2>請先用學校帳號登入</h2>
    <p>只接受 <b>@tkgsh.tn.edu.tw</b> 的 Google 帳號</p>
    <button class="gbtn" id="gbtn">
      <svg class="gicon" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.6l6.8-6.8C35.6 2.4 30.1 0 24 0 14.6 0 6.4 5.4 2.5 13.3l7.9 6.1C12.3 13.3 17.6 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v9h12.7c-.5 3-2.2 5.5-4.7 7.2l7.3 5.7c4.3-3.9 6.8-9.7 6.8-17.4z"/><path fill="#FBBC05" d="M10.4 28.4c-.5-1.5-.8-3.1-.8-4.9s.3-3.4.8-4.9l-7.9-6.1C.9 16 0 19.9 0 23.5s.9 7.5 2.5 11l7.9-6.1z"/><path fill="#34A853" d="M24 47c6.1 0 11.3-2 15-5.5l-7.3-5.7c-2 1.4-4.6 2.2-7.7 2.2-6.4 0-11.7-3.8-13.6-9.1l-7.9 6.1C6.4 42.6 14.6 47 24 47z"/></svg>
      使用學校 Google 帳號登入
    </button>
    <div class="err" id="loginerr" style="display:none"></div>
    <div class="note">🔐 僅限學校網域帳號；登入即代表你是本校同學</div>
  </div>

  <!-- 上傳表單 -->
  <div class="panel" id="form" style="display:none">
    <div class="who"><span class="avatar" id="avatar">?</span><span id="whoami"></span><span class="out" id="logout">登出</span></div>

    <label>📷 上傳題目照片（最方便）</label>
    <label class="drop" for="file">點這裡拍照 / 選照片，或把圖片拖進來<small>手機按下會直接開相機</small></label>
    <input id="file" type="file" accept="image/*" capture="environment" style="display:none">
    <div class="preview" id="preview"></div>

    <label>✍️ 或直接打字描述題目</label>
    <textarea id="qtext" placeholder="例：解 x² - 5x + 6 = 0，順便說明判別式…"></textarea>

    <label>📂 年級 <span class="req">＊必選</span></label>
    <select id="grade"><option value="">— 請選擇 —</option><option>高一</option><option>數A</option><option>數B</option></select>

    <label>📖 章節 <span class="req">＊必填</span></label>
    <input type="text" id="chapter" placeholder="例：三角函數、等比數列、機率…">

    <button class="submit" id="submit">送出題目</button>
    <div class="err" id="formerr" style="display:none"></div>
  </div>

  <!-- 完成 -->
  <div class="panel gate" id="done" style="display:none">
    <div class="big">🎉</div>
    <h2>已收到你的題目！</h2>
    <p>老師解答並審核後，會發布到題庫。<br>記得回來 <a href="index.html">題庫</a> 看答案 😊</p>
    <button class="gbtn" id="again" style="text-decoration:none">再問一題</button>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>
<script>
  var els = {};
  ['loading','closed','login','form','done'].forEach(function (id) { els[id] = document.getElementById(id); });
  function show(id) { ['loading','closed','login','form','done'].forEach(function (k) { els[k].style.display = (k === id) ? 'block' : 'none'; }); }

  function showError(el, msg) { el.style.display = 'block'; el.textContent = msg; }

  // 登入
  document.getElementById('gbtn').addEventListener('click', function () {
    sb.auth.signInWithOAuth({
      provider: 'google',
      options: {
        redirectTo: window.location.origin + window.location.pathname,
        queryParams: { hd: SCHOOL_DOMAIN, prompt: 'select_account' }
      }
    });
  });
  document.getElementById('logout').addEventListener('click', async function () { await sb.auth.signOut(); location.reload(); });
  document.getElementById('again').addEventListener('click', function () { location.reload(); });

  // 檔案預覽
  var fileInput = document.getElementById('file');
  fileInput.addEventListener('change', function () {
    document.getElementById('preview').textContent = fileInput.files.length ? '✓ 已選擇照片：' + fileInput.files[0].name : '';
  });

  // 送出
  document.getElementById('submit').addEventListener('click', async function () {
    var btn = this, formerr = document.getElementById('formerr');
    formerr.style.display = 'none';
    var grade = document.getElementById('grade').value;
    var chapter = document.getElementById('chapter').value.trim();
    var qtext = document.getElementById('qtext').value.trim();
    var file = fileInput.files[0];
    if (!grade) return showError(formerr, '請先選擇年級');
    if (!chapter) return showError(formerr, '請先填寫章節');
    if (!qtext && !file) return showError(formerr, '請至少拍照或打字其中一種');
    if (!isOpenNow()) return showError(formerr, '目前非開放時段（12:00–21:00），無法送出');

    btn.disabled = true; btn.textContent = '上傳中…';
    try {
      var imageUrl = null;
      if (file) {
        var sess = (await sb.auth.getSession()).data.session;
        var ext = (file.name.split('.').pop() || 'jpg').toLowerCase();
        var path = sess.user.id + '/' + crypto.randomUUID() + '.' + ext;
        var up = await sb.storage.from('questions').upload(path, file);
        if (up.error) throw up.error;
        imageUrl = sb.storage.from('questions').getPublicUrl(path).data.publicUrl;
      }
      var ins = await sb.from('submissions').insert({ grade: grade, chapter: chapter, question_text: qtext || null, image_url: imageUrl });
      if (ins.error) throw ins.error;
      show('done');
    } catch (e) {
      btn.disabled = false; btn.textContent = '送出題目';
      showError(formerr, '送出失敗：' + (e.message || e));
    }
  });

  // 初始化：判斷開放時段 → 登入狀態 → 網域
  async function init() {
    if (!isOpenNow()) { document.getElementById('nowtime').textContent = '台灣時間 ' + taipeiNow().txt; show('closed'); return; }
    var session = (await sb.auth.getSession()).data.session;
    if (!session) { show('login'); return; }
    var email = (session.user.email || '').toLowerCase();
    if (!email.endsWith('@' + SCHOOL_DOMAIN)) {
      await sb.auth.signOut();
      show('login');
      showError(document.getElementById('loginerr'), '這個帳號（' + email + '）不是學校帳號，請改用 @' + SCHOOL_DOMAIN + ' 登入');
      return;
    }
    var name = session.user.user_metadata.full_name || session.user.user_metadata.name || email;
    document.getElementById('whoami').textContent = '已登入：' + name + '（' + email + '）';
    document.getElementById('avatar').textContent = (name[0] || '?');
    show('form');
  }
  init();
</script>
</body>
</html>
